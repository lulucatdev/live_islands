---
name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  MIX_ENV: test
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  code_quality_and_tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: 1.18.1
            erlang: 27.2.0
    name: Elixir v${{ matrix.elixir }}, Erlang v${{ matrix.erlang }}
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.erlang }}
          elixir-version: ${{ matrix.elixir }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Retrieve Dependencies Cache
        uses: actions/cache@v4
        id: mix-cache
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-${{ matrix.erlang }}-${{ matrix.elixir }}-mix-${{ hashFiles('**/mix.lock') }}

      - name: Install Mix Dependencies
        run: mix deps.get

      - name: Install example Mix dependencies
        run: mix deps.get
        working-directory: live_islands_examples

      - name: Install root Node dependencies
        run: npm ci

      - name: Install example asset dependencies
        run: npm ci --prefix live_islands_examples/assets

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Check unused dependencies
        run: mix deps.unlock --check-unused

      - name: Compile dependencies
        run: mix deps.compile

      - name: Check format
        run: mix format --check-formatted

      - name: Check application compile warnings
        run: mix compile --force --warnings-as-errors

      - name: Check Credo warnings
        run: mix credo

      - name: Run tests
        run: mix test

      - name: Run browser e2e tests
        run: npm run e2e:test
