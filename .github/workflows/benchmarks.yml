---
name: Benchmarks

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  production_benchmarks:
    runs-on: ubuntu-latest
    name: Production benchmark suite
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27.2.0"
          elixir-version: "1.18.1"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Mix dependencies
        run: mix deps.get

      - name: Install example Mix dependencies
        run: mix deps.get
        working-directory: live_islands_examples

      - name: Install root Node dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Install example asset dependencies
        run: npm ci --prefix live_islands_examples/assets

      - name: Download previous release benchmark
        id: previous_benchmark
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          current="${GITHUB_REF_NAME}"
          previous="$(gh release list \
            --repo "${GITHUB_REPOSITORY}" \
            --exclude-drafts \
            --exclude-pre-releases \
            --limit 20 \
            --json tagName \
            --jq "[.[].tagName | select(. != \"${current}\")][0] // \"\"")"

          if [ -z "${previous}" ]; then
            echo "No previous release found."
            exit 0
          fi

          mkdir -p benchmarks/results/previous

          if gh release download "${previous}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "live-islands-benchmark.json" \
            --dir benchmarks/results/previous; then
            echo "compare=--compare=benchmarks/results/previous/live-islands-benchmark.json" >> "${GITHUB_OUTPUT}"
            echo "previous_tag=${previous}" >> "${GITHUB_OUTPUT}"
          else
            echo "Previous release ${previous} has no benchmark asset."
          fi

      - name: Run production benchmarks
        env:
          COMPARE_ARGS: ${{ steps.previous_benchmark.outputs.compare }}
        run: npm run benchmarks -- ${COMPARE_ARGS}

      - name: Prepare benchmark release assets
        run: |
          cp benchmarks/results/latest.json benchmarks/results/live-islands-benchmark.json
          cp benchmarks/results/latest.md benchmarks/results/live-islands-benchmark.md

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: live-islands-benchmarks
          path: |
            benchmarks/results/latest.json
            benchmarks/results/latest.md
            benchmarks/results/live-islands-benchmark.json
            benchmarks/results/live-islands-benchmark.md

      - name: Publish benchmark assets to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file benchmarks/results/latest.md

          gh release upload "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            benchmarks/results/live-islands-benchmark.json \
            benchmarks/results/live-islands-benchmark.md \
            --clobber

      - name: Update release benchmark summary
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          marker="<!-- live-islands-benchmark-summary -->"
          gh release view "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --json body \
            --jq .body > benchmarks/results/release-body.md

          awk 'index($0, "<!-- live-islands-benchmark-summary -->") { exit } { print }' \
            benchmarks/results/release-body.md > benchmarks/results/release-notes.md

          {
            printf '\n%s\n\n' "${marker}"
            sed 's/^# LiveIslands Benchmark Result/## Benchmark Result/' benchmarks/results/latest.md
          } >> benchmarks/results/release-notes.md

          gh release edit "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --notes-file benchmarks/results/release-notes.md
